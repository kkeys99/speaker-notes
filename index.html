<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Notes">
<title>Speaker Notes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #111; color: #e0e0e0; }

  #app { height: 100dvh; display: flex; flex-direction: column; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 16px; background: #1a1a1a; border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  .slide-title { font-size: 17px; font-weight: 700; color: #58a6ff; }
  .top-right { display: flex; align-items: center; gap: 8px; }
  .page-indicator { color: #ffa657; font-weight: 600; font-size: 13px; }

  .pace-bar {
    display: flex; align-items: center; gap: 0;
    background: #1a1a1a; border-bottom: 1px solid #222;
    padding: 4px 16px; flex-shrink: 0;
  }
  .pace-elapsed {
    font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums;
    color: #e0e0e0; min-width: 70px;
  }
  .pace-elapsed.ahead { color: #7ee787; }
  .pace-elapsed.behind { color: #f85149; }
  .pace-sep { color: #444; font-size: 20px; margin: 0 8px; }
  .pace-target { font-size: 16px; color: #666; font-variant-numeric: tabular-nums; }
  .pace-label { font-size: 11px; color: #555; margin-left: auto; text-transform: uppercase; letter-spacing: 0.5px; }
  .pace-diff { font-size: 14px; font-weight: 600; margin-left: 8px; font-variant-numeric: tabular-nums; }
  .pace-diff.ahead { color: #7ee787; }
  .pace-diff.behind { color: #f85149; }

  .notes-area {
    flex: 1; overflow: hidden; padding: 12px 18px;
    display: flex; flex-direction: column; justify-content: center;
  }

  .note-line { margin-bottom: 4px; font-size: 20px; line-height: 1.4; }
  .note-line.blank { height: 10px; }
  .note-line .cue { color: #7ee787; font-weight: 600; }
  .note-line .key { color: #ffa657; font-weight: 600; }
  .note-line .say { color: #d2a8ff; font-style: italic; }

  .nav-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; background: #1a1a1a; border-top: 1px solid #333;
    flex-shrink: 0;
  }
  .nav-btn {
    background: #2a2a2a; border: none; color: #aaa; font-size: 22px;
    width: 54px; height: 36px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:active { background: #444; }
  .dot-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
  .nav-dot {
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: #2a2a2a; color: #666; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-dot.active { background: #58a6ff; color: #fff; }
  .nav-dot.visited { background: #1a3a1a; color: #7ee787; }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <span class="slide-title" id="slideTitle"></span>
    <div class="top-right">
      <span class="page-indicator" id="pageIndicator"></span>
      <span id="slideNum" style="font-size:13px;color:#555"></span>
    </div>
  </div>
  <div class="pace-bar">
    <span class="pace-elapsed" id="elapsed">0:00</span>
    <span class="pace-sep">/</span>
    <span class="pace-target" id="targetTime">0:30</span>
    <span class="pace-label" id="paceLabel">target</span>
    <span class="pace-diff" id="paceDiff"></span>
  </div>
  <div class="notes-area" id="notesArea"></div>
  <div class="nav-bar">
    <button class="nav-btn" id="btnPrev">&#9664;</button>
    <div class="dot-row" id="navDots"></div>
    <button class="nav-btn" id="btnNext">&#9654;</button>
  </div>
</div>

<script>
var SLIDES = [
  {
    title: "1 — Title",
    target: 30,
    pages: [
      [
        "I'm Kevin, iOS team",
        "App size — where bytes are going,",
        "why it matters, what we can do",
      ]
    ]
  },
  {
    title: "2 — Why Size Matters",
    target: 180,
    pages: [
      [
        "{say}\"Four reasons.\"",
        "",
        "📱 {key}200 MB cellular limit",
        "  iOS warns before downloading >200 MB",
        "{cue}▶ ADVANCE → iOS alert dialog",
        "  Not a block — but kills conversion",
        "  We're at {key}189 MB = 11 MB headroom"
      ],
      [
        "  Uber crossed it:",
        "  installs {key}↓10%, sign-ups {key}↓12%",
        "  Not theoretical — Uber published these",
        "  {say}\"We do not want to hit that wall\""
      ],
      [
        "📉 Download conversion broadly",
        "  Google study: every {key}6 MB ≈ −1% installs",
        "  Metered markets (BR, IN, ID, SE Asia):",
        "  ~{key}2.5% per 10 MB",
        "  Many new users on prepaid data",
        "  Every MB costs them real money",
      ],
      [
        "{cue}▶ ADVANCE → bottom two cards",
        "",
        "💾 Storage pressure",
        "  Millions of {key}64 GB iPhones active",
        "  Settings → Storage sorts by size",
        "  Competing w/ photos, music, other apps",
        "  iOS quietly auto-offloads unused apps",
        "  User has to re-download to open"
      ],
      [
        "⚡ Launch time",
        "  More code → slower cold launch",
        "  System maps all binaries, resolves symbols",
        "  Worse on older devices = emerging markets",
      ]
    ]
  },
  {
    title: "3 — Download vs. Install",
    target: 90,
    pages: [
      [
        "Two different numbers people confuse",
        "",
        "⬇️ Download: {key}189 MB",
        "  Compressed, encrypted, thinned per device",
        "  Checked against 200 MB limit"
      ],
      [
        "  Updates are delta-compressed",
        "  → full size mostly matters for new installs",
        "",
        "💿 Install: {key}489 MB",
        "  On disk, uncompressed — {key}2.6× download",
        "  What users see in Settings → Storage"
      ],
      [
        "  Grows over time (caches, offline content)",
        "",
      ]
    ]
  },
  {
    title: "4 — Size Over Time",
    target: 120,
    pages: [
      [
        "Download size since 2016",
        "Red line = 200 MB cellular warning",
        "",
        "📈 2016: ~10 MB",
        "  Normal growth — more features, courses",
        "  Then mid-2024 → {key}almost vertical 🚨",
        "  {key}100 → 189 MB in ~18 months",
      ],
      [
        "  Two big contributors:",
        "  {key}Rive growing across more surfaces —",
        "  {key}Unity landed for Music —",
      ],
      [
        "🎯 {key}11 MB below the limit",
        "  Each change was reasonable",
        "  But look at the trajectory —",
      ]
    ]
  },
  {
    title: "5 — What's in an IPA",
    target: 180,
    pages: [
      [
        "{say}\"Let's crack one open.\"",
        "IPA = just a zip archive",
      ]
    ]
  },
  {
    title: "6 — X-Ray Report",
    target: 150,
    pages: [
      [
        "Real data: App Store v7.124.0",
        "",
        "Treemap: bigger rect = more bytes",
        "Colors = categories in legend"
      ],
      [
        "👉 {key}CoreUIJuicy — 107 MB",
        "  ¼ of the entire app(!)",
        "  More assets than most apps total"
      ],
      [
        "👉 {key}UnityFramework — 47 MB",
        "  One dependency = 11% of app",
      ],
      [
        "👉 {key}Ads — 34 MB",
        "  Third-party ad SDKs",
        "  Don't control, but paying the cost",
        "",
      ],
      [
        "{cue}▶ 1 → treemap morphs to bar chart",
        "",
        "  {say}\"Makes it visible at a glance —",
        "  data tells you where the bytes are.\"",
      ]
    ]
  },
  {
    title: "7 — What Can We Do?",
    target: 20,
    pages: [
      [
        "Section divider — brief pause",
        "",
        "Two things to go after:",
        "  assets & binaries",
      ]
    ]
  },
  {
    title: "8 — PR Size Tracking",
    target: 60,
    pages: [
      [
        "🔧 Emerge Tools",
        "  PR-level size tracking",
      ],
    ]
  },
  {
    title: "9 — Optimizing Assets",
    target: 120,
    pages: [
      [
        "{cue}▶ 1 → bar zooms to asset categories",
        "{key}122 MB in assets",
        "  images, Rive, Lottie, audio",
        "",
      ],
      [
        "{cue}▶ 2 → chart lifts",
        "  {say}\"What should you watch for",
        "  when adding or reviewing assets?\"",
        "",
        "{cue}▶ 3 — 🎨 Animations",
      ],
      [
        "{cue}▶ 4 — 🖼️ Images",
      ],
      [
        "{cue}▶ 5 — 🧹 Cleanup",
      ]
    ]
  },
  {
    title: "10 — Ship Less Upfront",
    target: 90,
    pages: [
      [
        "Don't ship everything day one",
        "",
        "Infrastructure already exists and works:",
        "  S3 for storage",
        "  CloudFront for delivery",
        "  ResourceClient in the app",
      ],
      [
        "{cue}▶ 1 — 📅 Seasonal content",
        "  start date and end date",
        "  Ship when needed, pull when done",
      ],
      [
        "{cue}▶ 2 — 🏆 Late in user journey",
        "  Day-one user hasn't reached Diamond",
        "  Ship when they get there"
      ],
      [
        "{cue}▶ 3 — 👤 User-specific",
        "  Course-specific, market-specific",
        "  Not every user learning every language",
        "",
        "  {say}\"Main tradeoff is risk of missing assets\"",
      ]
    ]
  },
  {
    title: "11 — Inside the Binary",
    target: 150,
    pages: [
      [
        "{say}\"Now the bigger piece — binary code\"",
        "",
        "  Divided into segments"
      ],
      [
        "{cue}▶ 1 → bar zooms to Binaries",
        "",
        "  Three segments, each has a job"
      ],
      [
        "{cue}▶ 4 — 🔵 __TEXT: {key}210 MB (77%)",
        "  Compiled code, string literals,",
        "  method names, Swift type descriptors",
        "  This is where dead code hides"
      ],
      [
        "  Example: utility fw has 50 functions,",
        "  app calls 10 — compiled instructions",
        "  for all 50 sitting in __TEXT",
      ],
      [
        "{cue}▶ 5 — 🟢 __DATA: {key}31 MB",
        "  Class tables, protocol conformances,",
        "  globals",
      ],
      [
        "{cue}▶ 6 — 🟣 __LINKEDIT: {key}33 MB",
        "  Bookkeeping for dynamic linker",
        "  Symbol tables, code sigs, fn starts",
        "  {key}244 separate binaries → 244× overhead",
      ],
      [
        "🎯 Same theme across all three:",
        "",
        "  Framework boundaries",
        "  create overhead",
      ]
    ]
  },
  {
    title: "12 — Static vs Dynamic",
    target: 180,
    pages: [
      [
        "➡️ Dynamic (what we have today)",
        "  Each fw = separate Mach-O, loaded by dyld",
        "  Black box to each other",
        "  Each fw pays own packaging tax",
      ],
      [
        "✅ When dynamic makes sense:",
        "",
        "  Apple fws (UIKit, Foundation, SwiftUI)",
        "  One copy on disk, mapped into every process",
        "  Hundreds of apps share one UIKit",
        "  Instead of each bundling their own",
        "  Big storage + memory win at OS level"
      ],
      [
        "  App extensions",
        "  Widget + NotifService share fws w/ main",
        "  If both need Bedrock, ship once as dynamic",
        "  instead of duplicating into both binaries",
        "  Extensions = separate processes",
        "  Dynamic fws = only way to share code"
      ],
      [
        "",
        "⬅️ Static linking",
        "  Linker merges into single binary",
        "  Sees every symbol at once",
        "  Another big win is faster load times"
      ],
      [
        "  Zero per-library packaging overhead",
        "",
        "  ⚠️ {key}NOT an architecture change",
        "  Still separate modules, targets, imports",
        "  Module boundaries, access control — same",
        "  {say}\"Only the linker output changes\""
      ],
      [
        "  ⚠️ Tradeoff: {key}build time",
        "  Real cost you should measure"
      ],
      [
        "{cue}▶ STEP 1 → stats row",
        "",
        "Not many frameworks are shared across extensions",
        "Many can go static, app builds working on this"
      ],
    ]
  },
  {
    title: "13 — Why Go Static",
    target: 120,
    pages: [
      [
        "220 → static. Some examples of why it's helpful",
        "",
        "{cue}▶ 1 — ✂️ Dead code stripping",
        "  Today: linker strips within fw boundary",
        "  Has to assume that code may be used by anyone, think like Apple",
        "  Static: sees everything at once"
      ],
      [
        "  Strips anything unreachable from entry",
        "  {key}Huge for 3rd-party dependencies —",
        "",
        "  Cascades: stripped fn →",
        "  its __DATA goes too —",
        "  protocol conformances, class tables, globals"
      ],
      [
        "{cue}▶ 2 — 🎯 Direct addressing",
        "  Dynamic: call → stub → GOT → target",
        "  (2 indirections, patched at launch)",
        "  Static: call → target (direct jump)",
      ],
      [
        "{cue}▶ 3 — 📦 Metadata consolidation",
        "  Every fw carries own linker bookkeeping",
        "  symbol tables, string tables",
        "  Merge → deduplicated, more highly optimized"
      ],
    ]
  },
  {
    title: "14 — Build Settings",
    target: 120,
    pages: [
      [
        "Compiler + linker settings that help —",
      ],
      [
        "🔴 LTO — Link-Time Optimization",
        "  Cross-module inlining + dead code",
        "  elimination at link time",
        "  Only works on code within same binary",
        "  So doesn't work well for dynamic frameworks"
      ],
      [
        "🟡 Dead Code Stripping [{key}LIMITED]",
        "  Walks call graph, removes unreachable",
        "  \"Unreachable\" = within one binary only",
      ],
      [
        "  Static → linker sees full call graph",
        "  Now it can strip across everything",
        "",
        "{say}\"The other two are already",
        "doing their job:\""
      ],
      [
        "✅ -Oz — Optimize for Size [{key}ENABLED]",
        "  Smaller instruction sequences over faster",
        "  Loops stay compact instead of unrolling",
        "  One copy of fn instead of inlining",
        "  Typically {key}10–20% smaller machine code"
      ],
      [
        "✅ WMO [{key}ENABLED]",
        "  Whole Module Optimization",
        "  By default Swift compiles each file",
        "  independently — WMO sees all at once",
        "  Inline across files, drop dead internals",
      ]
    ]
  },
  {
    title: "15 — Takeaways",
    target: 90,
    pages: [
      [
        "{say}\"Three things.\"",
        "",
        "🔴 {key}11 MB of headroom",
        "  Not a lot of room for new initiatives",
      ],
      [
        "🟠 {key}Assets = easiest start",
      ],
      [
        "🔵 {key}Compile & link choices matter",
        "  Bigger project, bigger payoff"
      ],
    ]
  }
];

var cumTargets = [];
(function() {
  var t = 0;
  SLIDES.forEach(function(s) { t += s.target; cumTargets.push(t); });
})();

var current = 0;
var page = 0;
var visited = new Set([0]);
var startTime = null;
var timerInterval = null;

var titleEl = document.getElementById("slideTitle");
var numEl = document.getElementById("slideNum");
var pageEl = document.getElementById("pageIndicator");
var notesEl = document.getElementById("notesArea");
var dotsEl = document.getElementById("navDots");
var elapsedEl = document.getElementById("elapsed");
var targetEl = document.getElementById("targetTime");
var diffEl = document.getElementById("paceDiff");

function fmt(sec) {
  var m = Math.floor(Math.abs(sec) / 60);
  var s = Math.abs(sec) % 60;
  return m + ":" + (s < 10 ? "0" : "") + s;
}

function updateTimer() {
  if (!startTime) return;
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var target = cumTargets[current] || 0;
  var diff = elapsed - target;
  elapsedEl.textContent = fmt(elapsed);
  elapsedEl.className = "pace-elapsed" + (diff > 60 ? " behind" : diff < -30 ? " ahead" : "");
  diffEl.textContent = diff <= 0 ? fmt(-diff) + " ahead" : fmt(diff) + " behind";
  diffEl.className = "pace-diff" + (diff > 60 ? " behind" : " ahead");
}

function startTimer() {
  if (startTime) return;
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
}

function updateTarget() {
  targetEl.textContent = fmt(cumTargets[current] || 0);
}

function renderDots() {
  dotsEl.innerHTML = "";
  SLIDES.forEach(function(_, i) {
    var btn = document.createElement("button");
    btn.className = "nav-dot" + (i === current ? " active" : visited.has(i) ? " visited" : "");
    btn.textContent = String(i + 1);
    btn.addEventListener("click", function(e) { e.stopPropagation(); goToSlide(i); });
    dotsEl.appendChild(btn);
  });
}

function renderNotes() {
  var slide = SLIDES[current];
  var totalPages = slide.pages.length;
  titleEl.textContent = slide.title;
  numEl.textContent = (current + 1) + "/" + SLIDES.length;
  pageEl.textContent = totalPages > 1 ? "pg " + (page + 1) + "/" + totalPages : "";
  updateTarget();

  notesEl.innerHTML = "";
  slide.pages[page].forEach(function(line) {
    var div = document.createElement("div");
    div.className = "note-line";
    if (line === "") { div.className += " blank"; notesEl.appendChild(div); return; }
    var html = line
      .replace(/\{cue\}([^{]*?)(?=$|\{)/g, '<span class="cue">$1</span>')
      .replace(/\{say\}/g, '<span class="say">')
      .replace(/\{key\}/g, '<span class="key">')
      .replace(/(<span class="(?:key|say)">)([^<]*)/g, function(_, tag, text) { return tag + text + '</span>'; });
    div.innerHTML = html;
    notesEl.appendChild(div);
  });
}

function goToSlide(i) {
  current = Math.max(0, Math.min(SLIDES.length - 1, i));
  page = 0;
  visited.add(current);
  renderNotes();
  renderDots();
}

function advance() {
  startTimer();
  var slide = SLIDES[current];
  if (page < slide.pages.length - 1) {
    page++;
    renderNotes();
  } else {
    goToSlide(current + 1);
  }
}

function retreat() {
  if (page > 0) {
    page--;
    renderNotes();
  } else if (current > 0) {
    current--;
    page = SLIDES[current].pages.length - 1;
    visited.add(current);
    renderNotes();
    renderDots();
  }
}

document.getElementById("btnPrev").addEventListener("click", function(e) { e.stopPropagation(); retreat(); });
document.getElementById("btnNext").addEventListener("click", function(e) { e.stopPropagation(); advance(); });

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); advance(); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); retreat(); }
});

var touchStartX = 0;
var touchStartY = 0;
notesEl.addEventListener("touchstart", function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
notesEl.addEventListener("touchend", function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) advance(); else retreat();
  }
}, { passive: true });

elapsedEl.addEventListener("click", function(e) {
  e.stopPropagation();
  startTime = null;
  clearInterval(timerInterval);
  timerInterval = null;
  elapsedEl.textContent = "0:00";
  elapsedEl.className = "pace-elapsed";
  diffEl.textContent = "";
});

renderNotes();
renderDots();
</script>
</body>
</html>
