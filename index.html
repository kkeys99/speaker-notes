<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Notes">
<title>Speaker Notes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #111; color: #e0e0e0; }

  #app { height: 100dvh; display: flex; flex-direction: column; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: #1a1a1a; border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  .slide-title { font-size: 18px; font-weight: 700; color: #58a6ff; }
  .slide-meta { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #666; }
  .page-indicator { color: #ffa657; font-weight: 600; }
  .timer { color: #888; font-variant-numeric: tabular-nums; font-size: 15px; font-weight: 600; }
  .timer.warning { color: #f0883e; }
  .timer.danger { color: #f85149; }

  .notes-area {
    flex: 1; overflow: hidden; padding: 14px 20px;
    display: flex; flex-direction: column; justify-content: center;
  }

  .note-line { margin-bottom: 5px; font-size: 22px; line-height: 1.4; }
  .note-line.blank { height: 12px; }
  .note-line .cue { color: #7ee787; font-weight: 600; }
  .note-line .key { color: #ffa657; font-weight: 600; }

  .nav-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; background: #1a1a1a; border-top: 1px solid #333;
    flex-shrink: 0;
  }
  .nav-btn {
    background: #2a2a2a; border: none; color: #aaa; font-size: 22px;
    width: 54px; height: 36px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:active { background: #444; }
  .dot-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
  .nav-dot {
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: #2a2a2a; color: #666; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-dot.active { background: #58a6ff; color: #fff; }
  .nav-dot.visited { background: #1a3a1a; color: #7ee787; }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <span class="slide-title" id="slideTitle"></span>
    <div class="slide-meta">
      <span id="slideNum"></span>
      <span class="page-indicator" id="pageIndicator"></span>
      <span class="timer" id="timer">0:00</span>
    </div>
  </div>
  <div class="notes-area" id="notesArea"></div>
  <div class="nav-bar">
    <button class="nav-btn" id="btnPrev">&#9664;</button>
    <div class="dot-row" id="navDots"></div>
    <button class="nav-btn" id="btnNext">&#9654;</button>
  </div>
</div>

<script>
var SLIDES = [
  {
    title: "1 — Title",
    pages: [
      ["I'm Kevin, iOS team", "App size: where bytes go,", "why it matters, what to do", "Principles apply to any client"]
    ]
  },
  {
    title: "2 — Why Size Matters",
    pages: [
      [
        "Four reasons.",
        "",
        "📱 {key}200 MB cellular limit",
        "  We're at {key}189 MB → 11 MB headroom",
        "  One Rive = couple MB, one SDK = 10 MB"
      ],
      [
        "  Uber crossed it:",
        "  installs {key}−10%, sign-ups {key}−12%",
        "  We don't want to hit that wall",
        "",
        "{cue}▶ ADVANCE → iOS alert dialog"
      ],
      [
        "  That's the warning dialog",
        "  \"Later On Wi-Fi\" = what most tap",
        "",
        "📉 Download conversion",
        "  Google: every 6 MB ≈ {key}−1% installs"
      ],
      [
        "  Metered markets (BR, IN, ID):",
        "  ~2.5% per 10 MB",
        "  Prepaid data — 189 MB is a hard sell",
        "",
        "{cue}▶ ADVANCE → bottom two cards"
      ],
      [
        "💾 Storage pressure",
        "  Millions of 64 GB iPhones active",
        "  iOS auto-offloads unused apps",
        "  Settings → Storage sorts by size",
        "  We're {key}~½ GB on disk"
      ],
      [
        "⚡ Launch time",
        "  More code → slower cold launch",
        "  Worse on older devices",
        "  = emerging markets",
        "  Comes back w/ dynamic frameworks"
      ]
    ]
  },
  {
    title: "3 — Download vs. Install",
    pages: [
      [
        "Two numbers people confuse",
        "",
        "⬇️ Download: {key}189 MB",
        "  Compressed + encrypted + thinned",
        "  Checked against 200 MB limit"
      ],
      [
        "  Updates are delta-compressed",
        "  Full size matters for new installs",
        "",
        "💿 Install: {key}489 MB",
        "  On disk, uncompressed — 2.6× download"
      ],
      [
        "  What users see in Settings → Storage",
        "  Grows over time (caches, offline)",
        "  Binary code = biggest contributor",
        "",
        "\"Ask which — different causes, fixes\""
      ]
    ]
  },
  {
    title: "4 — Size Over Time",
    pages: [
      [
        "Chart since 2016, red = 200 MB",
        "",
        "📈 2016: ~10 MB",
        "  2017–18: climb to ~75 MB",
        "  Normal feature growth"
      ],
      [
        "  2020: dip — cleanup",
        "  2022–23: flat ~80–100 MB",
        "  Still well below limit",
        "",
        "  Then mid-2024 → {key}vertical 🚨"
      ],
      [
        "  {key}100 → 189 MB in ~18 months",
        "  Rive animations growing steadily",
        "  Unity landed for Music",
        "",
        "🎯 11 MB below the limit"
      ],
      [
        "  No single PR was the problem",
        "  Trajectory is the problem",
        "  Need to understand what's inside"
      ]
    ]
  },
  {
    title: "5 — What's in an IPA",
    pages: [
      [
        "\"Let's crack one open\"",
        "IPA = just a zip archive",
        "",
        "{cue}▶ 1 — definition card",
        "  iOS App Store Package, signed zip"
      ],
      [
        "{cue}▶ 2 — lede",
        "  Rename .zip, unzip, poke around",
        "  Try it — download from ASC",
        "",
        "{cue}▶ 3 — Payload/",
        "  One dir: DuolingoMobile.app/"
      ],
      [
        "{cue}▶ 4 — DuolingoMobile",
        "  Mach-O binary (Apple's ELF)",
        "  Compiled Swift + ObjC, main target",
        "  ~46 MB — but most code isn't here"
      ],
      [
        "{cue}▶ 5 — Assets.car + loose",
        "  Assets.car = compiled catalog",
        "  Apple thins per device ✅",
        "  Loose (.riv .mp3 .json) ship as-is ❌",
        "  Catalog optimized, loose files not"
      ],
      [
        "{cue}▶ 6 — Info.plist + _CodeSignature",
        "  Bundle ID, version, permissions",
        "  + hashes for every file"
      ],
      [
        "{cue}▶ 7 — Frameworks/",
        "  {key}243 dynamic frameworks",
        "  Each = own binary + resources + sig",
        "  Where most of our code lives"
      ],
      [
        "{cue}▶ 8 — Bedrock.framework/",
        "  Mach-O, assets, plist, sig",
        "{cue}▶ 9 — CoreExperiments",
        "  Same layout"
      ],
      [
        "{cue}▶ 10 — \"...241 more\"",
        "  Per-framework packaging tax × 243",
        "  Exact numbers in a few slides"
      ]
    ]
  },
  {
    title: "6 — X-Ray Report",
    pages: [
      [
        "Real data: App Store v7.124.0",
        "Built a tool — walks entire bundle",
        "Treemap: bigger rect = more bytes"
      ],
      [
        "🔵 Binaries: {key}274 / 434 MB = 63%",
        "  More than everything else combined",
        "",
        "But look at assets first —",
        "most accessible wins"
      ],
      [
        "👉 {key}CoreUIJuicy — 107 MB",
        "  ¼ of the entire app",
        "  35 img, 26 Rive, 25 Lottie, 8 audio",
        "  More assets than most apps total"
      ],
      [
        "👉 {key}UnityFramework — 47 MB",
        "  Music engine, mostly binary",
        "  One dependency = 11% of app"
      ],
      [
        "👉 {key}Ads — 34 MB third-party",
        "👉 {key}NewYearsPromo — still in bundle!",
        "  Seasonal event long over",
        "  Should be cleaned up / on-demand"
      ],
      [
        "{cue}▶ 1 → treemap morphs to bar",
        "  \"Sharing the link after the talk",
        "  so you can explore your frameworks\""
      ]
    ]
  },
  {
    title: "7 — What Can We Do?",
    pages: [
      [
        "Section divider — pause",
        "",
        "Two tracks: assets & binaries",
        "Assets first — anyone can help,",
        "no build system changes needed"
      ]
    ]
  },
  {
    title: "8 — PR Size Tracking",
    pages: [
      [
        "🔧 Emerge Tools",
        "  Every PR gets automated size report",
        "  Total download, diff from main,",
        "  which frameworks grew/shrank"
      ],
      [
        "{cue}▶ Play / scrub the video",
        "  This is the Unity PR",
        "  {key}37 MB new binary from Unity",
        "  \"Worth glancing at in reviews\""
      ]
    ]
  },
  {
    title: "9 — Optimizing Assets",
    pages: [
      [
        "{key}122 MB in assets",
        "  images, Rive, Lottie, audio",
        "  Every engineer touches this stuff",
        "",
        "{cue}▶ 1 → bar zooms to categories"
      ],
      [
        "{cue}▶ 2 → chart lifts",
        "  \"What to watch for?\"",
        "",
        "{cue}▶ 3 — 🎨 Animations",
        "  Rive + Lottie = {key}69 MB (>½ assets)"
      ],
      [
        "  Ask design: are large assets optimized?",
        "  Shared artboards, not duplicated paths",
        "  No embedded rasters",
        "  Rive fonts duplicate if not shared"
      ],
      [
        "{cue}▶ 4 — 🖼️ Images",
        "  Avoid gradients/blurs that",
        "  don't vectorize well",
        "  Reuse existing before adding new",
        "  Shape in code = zero bundle cost"
      ],
      [
        "{cue}▶ 5 — 🧹 Cleanup",
        "  Kill experiment → delete its assets",
        "  Stumble across unused → remove it",
        "  NewYearsPromo still in bundle"
      ]
    ]
  },
  {
    title: "10 — Ship Less Upfront",
    pages: [
      [
        "Don't ship everything day one",
        "Infra exists and is working:",
        "  S3 + CloudFront + ResourceClient",
        "Question: what should we move?"
      ],
      [
        "{cue}▶ 1 — 📅 Seasonal",
        "  YIR, sub promos, holiday events",
        "  Time-boxed: ship when needed,",
        "  pull when done",
        "  No YIR assets in July"
      ],
      [
        "{cue}▶ 2 — 🏆 Late in journey",
        "  Higher leagues, advanced animations",
        "  Day-one user hasn't hit Diamond",
        "  Ship when they get there"
      ],
      [
        "{cue}▶ 3 — 👤 User-specific",
        "  Course-specific, market-specific",
        "  Pull what applies, skip the rest",
        "",
        "Identify candidates → ResourceClient"
      ]
    ]
  },
  {
    title: "11 — Inside the Binary",
    pages: [
      [
        "Now the bigger piece — binary code",
        "  {key}274 MB across 244 Mach-O binaries",
        "  Main exec + 243 frameworks",
        "  Mach-O = Apple's ELF"
      ],
      [
        "{cue}▶ 1 → bar zooms to Binaries",
        "{cue}▶ 2 → splits into segments",
        "{cue}▶ 3 → chart lifts",
        "",
        "Three segments, each has a job"
      ],
      [
        "{cue}▶ 4 — 🔵 __TEXT: {key}210 MB (77%)",
        "  Compiled code, strings, type descriptors",
        "  Where dead code hides"
      ],
      [
        "  50 fns in a utility fw, app calls 10",
        "  All 50 ship — linker can't see",
        "  across dynamic fw boundaries",
        "  ×243 → unused code accumulates"
      ],
      [
        "{cue}▶ 5 — 🟢 __DATA: {key}31 MB",
        "  Class tables, protocol conformances",
        "  Each fw emits own records",
        "  1 protocol × 20 conformers = 20 entries"
      ],
      [
        "{cue}▶ 6 — 🟣 __LINKEDIT: {key}33 MB",
        "  Symbol tables, code sigs, fn starts",
        "  244 binaries → 244× bookkeeping",
        "  Merge → one set of tables"
      ],
      [
        "🎯 Same theme across all three:",
        "  Framework boundaries create overhead",
        "  and block optimization"
      ]
    ]
  },
  {
    title: "12 — Static vs Dynamic",
    pages: [
      [
        "Two ways to package a library",
        "",
        "⬅️ Static linking",
        "  Linker merges → single binary",
        "  Sees every symbol at once"
      ],
      [
        "  Strips dead code across modules",
        "  Inlines across modules",
        "  Zero per-library packaging overhead",
        "",
        "  ⚠️ {key}NOT an architecture change"
      ],
      [
        "  Still separate modules/targets/imports",
        "  Only the linker output changes",
        "",
        "  ⚠️ Tradeoff: {key}build time",
        "  Change one file → re-link whole app"
      ],
      [
        "➡️ Dynamic (what we have today)",
        "  Each fw = separate Mach-O via dyld",
        "  Black box to each other",
        "  Can't strip across boundaries",
        "  But: faster incremental builds"
      ],
      [
        "✅ When dynamic makes sense:",
        "",
        "  Apple fws (UIKit, Foundation, SwiftUI)",
        "  One copy on disk, every process maps it",
        "  Hundreds of apps share one UIKit"
      ],
      [
        "  App extensions",
        "  Widget + NotifService share fws",
        "  Extensions = separate processes",
        "  Dynamic = only way to share code"
      ],
      [
        "{cue}▶ STEP 1 → stats row",
        "",
        "  {key}243 dynamic frameworks",
        "  {key} 23 shared w/ extensions → stay",
        "  {key}220 main-app only → go static"
      ],
      [
        "  220 static → linker gets full visibility",
        "  Dead code stripping across all modules",
        "",
        "  ⚡ Launch time ∝ fw count",
        "  Fewer fws = faster cold starts"
      ]
    ]
  },
  {
    title: "13 — Why Go Static",
    pages: [
      [
        "220 → static. What does it buy?",
        "",
        "{cue}▶ 1 — ✂️ Dead code stripping",
        "  Today: within one fw only"
      ],
      [
        "  Static: sees everything, strips all",
        "  unreachable from entry point",
        "  Huge for 3rd-party SDKs —",
        "  use a fraction, ship all their code"
      ],
      [
        "  Cascades: stripped fn →",
        "  its __DATA goes too",
        "  Conformances, class tables, globals"
      ],
      [
        "{cue}▶ 2 — 🎯 Direct addressing",
        "  Dynamic: call→stub→GOT→target",
        "  (2 indirections, patched at launch)",
        "  Static: call→target (direct jump)"
      ],
      [
        "{cue}▶ 3 — 📦 Metadata consolidation",
        "  243 fws × own export tries,",
        "  symbol tables, string tables",
        "  Merge → one of each, deduplicated"
      ],
      [
        "All three compound",
        "across every segment"
      ]
    ]
  },
  {
    title: "14 — Build Settings",
    pages: [
      [
        "Settings that should help —",
        "first two {key}capped by fw count,",
        "way more effective after static"
      ],
      [
        "🔴 LTO [BLOCKED]",
        "  Cross-module inlining +",
        "  dead code elimination at link time",
        "  Only works on statically linked code"
      ],
      [
        "  220 dynamic → most code invisible",
        "  Go static → LTO sees whole app"
      ],
      [
        "🟡 DEAD_CODE_STRIPPING [LIMITED]",
        "  Walks call graph, removes unreachable",
        "  \"Unreachable\" = within one binary only"
      ],
      [
        "  Can't strip public fn in fw A even if",
        "  nothing in the whole app calls it",
        "  Static → linker sees full call graph"
      ],
      [
        "The other two already doing their job:",
        "",
        "✅ -Oz [ENABLED]",
        "  Compact instructions over fast ones",
        "  ~10–20% smaller machine code"
      ],
      [
        "✅ WMO [ENABLED]",
        "  Sees all files in module at once",
        "  Inline across files, drop dead internals",
        "  LTO-lite scoped to one module"
      ]
    ]
  },
  {
    title: "15 — Takeaways",
    pages: [
      [
        "Three things:",
        "",
        "🔴 {key}11 MB headroom",
        "  Not a lot of room for new stuff",
        "  without thinking about what we ship"
      ],
      [
        "🟠 {key}Assets = easiest start",
        "  Work w/ design on animation sizes",
        "  Clean up unused",
        "  Seasonal → ResourceClient",
        "  No build changes needed"
      ],
      [
        "🔵 {key}Compile & link choices matter",
        "  220 fws → static unlocks",
        "  dead code stripping + LTO",
        "  Bigger project, bigger payoff"
      ],
      [
        "Asset size = design conversation",
        "Static linking = build infrastructure",
        "Different owners, same goal",
        "",
        "❓ Questions — anything"
      ]
    ]
  }
];

var current = 0;
var page = 0;
var visited = new Set([0]);
var startTime = null;
var timerInterval = null;

var titleEl = document.getElementById("slideTitle");
var numEl = document.getElementById("slideNum");
var pageEl = document.getElementById("pageIndicator");
var notesEl = document.getElementById("notesArea");
var dotsEl = document.getElementById("navDots");
var timerEl = document.getElementById("timer");

function updateTimer() {
  if (!startTime) return;
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var m = Math.floor(elapsed / 60);
  var s = elapsed % 60;
  timerEl.textContent = m + ":" + (s < 10 ? "0" : "") + s;
  timerEl.className = "timer" + (elapsed >= 1800 ? " danger" : elapsed >= 1500 ? " warning" : "");
}

function startTimer() {
  if (startTime) return;
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
}

function renderDots() {
  dotsEl.innerHTML = "";
  SLIDES.forEach(function(_, i) {
    var btn = document.createElement("button");
    btn.className = "nav-dot" + (i === current ? " active" : visited.has(i) ? " visited" : "");
    btn.textContent = String(i + 1);
    btn.addEventListener("click", function(e) { e.stopPropagation(); goToSlide(i); });
    dotsEl.appendChild(btn);
  });
}

function renderNotes() {
  var slide = SLIDES[current];
  var totalPages = slide.pages.length;
  titleEl.textContent = slide.title;
  numEl.textContent = (current + 1) + "/" + SLIDES.length;
  pageEl.textContent = totalPages > 1 ? "pg " + (page + 1) + "/" + totalPages : "";

  notesEl.innerHTML = "";
  slide.pages[page].forEach(function(line) {
    var div = document.createElement("div");
    div.className = "note-line";
    if (line === "") { div.className += " blank"; notesEl.appendChild(div); return; }
    var html = line
      .replace(/\{cue\}([^{]*?)(?=$|{)/g, '<span class="cue">$1</span>')
      .replace(/\{key\}/g, '<span class="key">')
      .replace(/(<span class="key">)([^<]*)/g, function(_, tag, text) { return tag + text + '</span>'; });
    div.innerHTML = html;
    notesEl.appendChild(div);
  });
}

function goToSlide(i) {
  current = Math.max(0, Math.min(SLIDES.length - 1, i));
  page = 0;
  visited.add(current);
  renderNotes();
  renderDots();
}

function advance() {
  startTimer();
  var slide = SLIDES[current];
  if (page < slide.pages.length - 1) {
    page++;
    renderNotes();
  } else {
    goToSlide(current + 1);
  }
}

function retreat() {
  if (page > 0) {
    page--;
    renderNotes();
  } else if (current > 0) {
    current--;
    page = SLIDES[current].pages.length - 1;
    visited.add(current);
    renderNotes();
    renderDots();
  }
}

document.getElementById("btnPrev").addEventListener("click", function(e) { e.stopPropagation(); retreat(); });
document.getElementById("btnNext").addEventListener("click", function(e) { e.stopPropagation(); advance(); });

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); advance(); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); retreat(); }
});

var touchStartX = 0;
var touchStartY = 0;
notesEl.addEventListener("touchstart", function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
notesEl.addEventListener("touchend", function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) advance(); else retreat();
  }
}, { passive: true });

timerEl.addEventListener("click", function(e) {
  e.stopPropagation();
  startTime = null;
  clearInterval(timerInterval);
  timerInterval = null;
  timerEl.textContent = "0:00";
  timerEl.className = "timer";
});

renderNotes();
renderDots();
</script>
</body>
</html>
